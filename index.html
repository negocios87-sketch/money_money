<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Vendas — Board Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#FFD700;--green:#00FF41;--cyan:#00FFFF;--dim:#666;--bg:#000}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:'Space Mono',monospace}

canvas#particles{position:fixed;inset:0;pointer-events:none;z-index:0}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(to bottom,transparent,transparent 3px,rgba(0,0,0,.06) 3px,rgba(0,0,0,.06) 6px)}
canvas#confetti{position:fixed;inset:0;pointer-events:none;z-index:100;opacity:0;transition:opacity .3s}
canvas#confetti.active{opacity:1}
#enter-screen{
  position:fixed;inset:0;z-index:999;
  background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  cursor:pointer;
}
#enter-screen .e-brand{font-family:'Anton',sans-serif;font-size:48px;letter-spacing:.3em;color:var(--gold)}
#enter-screen .e-sub{font-size:12px;letter-spacing:.3em;color:var(--dim)}
#enter-screen .e-btn{
  margin-top:16px;padding:14px 48px;
  border:1px solid var(--gold);color:var(--gold);
  font-family:'Anton',sans-serif;font-size:18px;letter-spacing:.2em;
  background:transparent;cursor:pointer;
  transition:background .2s,color .2s;
}
#enter-screen .e-btn:hover{background:var(--gold);color:#000}
#venda-overlay{position:fixed;inset:0;z-index:90;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .3s}
#venda-overlay.show{opacity:1}
.venda-text{font-family:'Anton',sans-serif;font-size:min(18vw,200px);color:var(--green);letter-spacing:.05em;text-shadow:0 0 60px rgba(0,255,65,.5);animation:stampIn .35s cubic-bezier(.175,.885,.32,1.275)}
@keyframes stampIn{from{transform:scale(3);opacity:0}to{transform:scale(1);opacity:1}}

/* LAYOUT */
.wrap{position:relative;z-index:2;width:100%;height:100vh;display:grid;grid-template-rows:auto 1fr auto}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:20px 60px;border-bottom:1px solid rgba(255,215,0,.2);flex-shrink:0}
.brand{font-family:'Anton',sans-serif;font-size:28px;letter-spacing:.3em;color:var(--gold)}
.brand em{color:#fff;opacity:.4;font-style:normal}
.clock{font-size:22px;color:var(--dim);letter-spacing:.1em}

/* MAIN */
main{display:flex;align-items:center;padding:40px 60px;gap:60px;min-height:0;overflow:hidden}

/* FOTO */
.photo-wrap{flex-shrink:0;position:relative;width:min(58vh,520px);height:min(58vh,520px)}
.ring-gold{position:absolute;inset:-8px;border-radius:50%;border:4px solid var(--gold);animation:pulse 2.2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,.45)}50%{box-shadow:0 0 0 18px rgba(255,215,0,.08),0 0 0 36px rgba(255,215,0,.03)}}
#closer-img,#closer-init{width:100%;height:100%;border-radius:50%;object-fit:cover;border:4px solid var(--gold)}
#closer-init{display:none;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:26%;color:var(--gold);background:#111}
.sdr-wrap{position:absolute;bottom:-12px;right:-24px;width:40%;height:40%;display:none}
.ring-cyan{position:absolute;inset:-5px;border-radius:50%;border:2px solid var(--cyan);box-shadow:0 0 14px rgba(0,255,255,.25)}
#sdr-img,#sdr-init{width:100%;height:100%;border-radius:50%;object-fit:cover;border:2px solid var(--cyan)}
#sdr-init{display:none;align-items:center;justify-content:center;font-family:'Anton',sans-serif;font-size:36%;color:var(--cyan);background:#051515}

/* INFO */
.info{flex:1;min-width:0;display:flex;flex-direction:column;gap:12px;animation:slideIn .5s ease-out}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
.pill{display:inline-flex;padding:5px 20px;border-radius:4px;font-size:12px;letter-spacing:.2em;border:1px solid var(--cyan);color:var(--cyan);background:rgba(0,255,255,.06);width:fit-content}
.lbl{font-size:12px;letter-spacing:.2em;color:var(--dim);margin-top:6px}
.closer-name{font-family:'Anton',sans-serif;font-size:min(10vw,110px);line-height:1;color:#fff;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.valor-txt{font-family:'Anton',sans-serif;font-size:min(11vw,120px);line-height:1;color:var(--gold);letter-spacing:-.01em;text-shadow:0 0 50px rgba(255,215,0,.25)}
.divider{height:1px;background:rgba(255,255,255,.08);margin:6px 0}
.details{display:flex;flex-direction:column;gap:12px}
.drow{display:flex;align-items:baseline;gap:16px}
.dlbl{font-size:11px;letter-spacing:.2em;color:var(--dim);flex-shrink:0;width:100px}
.dval{font-size:18px;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dval.cyan{color:var(--cyan)}

/* ÚLTIMAS VENDAS */
.recentes-bar{border-top:1px solid rgba(255,215,0,.25);flex-shrink:0;background:#000;display:flex;align-items:stretch}
.recentes-label{flex-shrink:0;padding:0 22px;border-right:1px solid rgba(255,215,0,.2);font-size:11px;letter-spacing:.15em;color:var(--gold);white-space:nowrap;display:flex;align-items:center}
.recentes-cards{flex:1;display:grid;grid-template-columns:repeat(3,1fr)}
.r-card{padding:14px 22px;border-right:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column;gap:4px}
.r-card:last-child{border-right:none}
.r-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);display:inline-block;margin-right:8px}
.r-closer{font-family:'Anton',sans-serif;font-size:20px;color:#fff;letter-spacing:.03em}
.r-valor{font-family:'Anton',sans-serif;font-size:20px;color:var(--gold)}
.r-meta{display:flex;align-items:center;gap:8px;margin-top:2px}
.r-funil{font-size:10px;letter-spacing:.15em;color:var(--gold);border:1px solid rgba(255,215,0,.3);background:rgba(255,215,0,.06);padding:2px 8px;border-radius:3px}
.r-produto{font-size:11px;color:#555;letter-spacing:.04em}
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="scanlines"></div>
<canvas id="confetti"></canvas>
<div id="enter-screen">
  <div class="e-brand">BOARD · ACADEMY</div>
  <div class="e-sub">PAINEL DE VENDAS</div>
  <button class="e-btn" onclick="entrar()">ENTRAR</button>
  <button class="e-btn" style="margin-top:8px;font-size:13px;padding:10px 32px;opacity:.5" onclick="testSound()">TESTAR SOM</button>
</div>

<div id="flash"></div>
<div id="venda-overlay"><div class="venda-text">FECHOOOU!</div></div>

<div class="wrap">

  <header>
    <div class="brand">BOARD <em>·</em> ACADEMY</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:5px">
      <div style="font-size:9px;letter-spacing:.15em;color:var(--dim)">PRÓX. ATUALIZAÇÃO</div>
      <div style="width:160px;height:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden">
        <div id="refresh-fill" style="height:100%;width:100%;background:var(--gold);border-radius:2px;transition:width 1s linear"></div>
      </div>
    </div>
    <div class="clock" id="clock">--:--:--</div>
  </header>

  <main>
    <div class="photo-wrap">
      <div class="ring-gold"></div>
      <img id="closer-img" src="" alt="" style="display:none">
      <div id="closer-init" style="display:none"></div>
      <div class="sdr-wrap" id="sdr-wrap">
        <div class="ring-cyan"></div>
        <img id="sdr-img" src="" alt="" style="display:none">
        <div id="sdr-init" style="display:none"></div>
      </div>
    </div>

    <div class="info" id="info">
      <div class="pill" id="pill">—</div>
      <div class="lbl">CLOSER</div>
      <div class="closer-name" id="closer-name">—</div>
      <div class="valor-txt" id="valor">R$ —</div>
      <div class="divider"></div>
      <div class="details">
        <div class="drow"><span class="dlbl">PRODUTO</span><span class="dval" id="produto">—</span></div>
        <div class="drow"><span class="dlbl">SDR</span><span class="dval cyan" id="sdr-name">—</span></div>
        <div class="drow"><span class="dlbl">GANHO EM</span><span class="dval" id="data-ganho">—</span></div>
      </div>
    </div>
  </main>

  <div class="recentes-bar">
    <div class="recentes-label" id="recentes-label">ÚLTIMAS 3 VENDAS</div>
    <div class="recentes-cards" id="recentes-cards">
      <div class="r-card"><span class="r-closer">—</span></div>
    </div>
  </div>

</div>

<script>
const REFRESH_MS = 180000;
const F_PRODUTO  = '8bdce76ba66f0fed0280918a4845190c92899ed5';
const F_QUALIF   = 'a6f13cc27c8d041f3af4091283ce0d4fe0913875';
const FOTOS_PATH = 'https://raw.githubusercontent.com/negocios87-sketch/fotos_time_comercial/main/';
const SOM_PATH   = '/sons/ganho.mp3';
const PIPELINE_MAP={31:'DISCOVERY',39:'ORION',46:'OLYMPUS',50:'LATAM',51:'NAVIGATOR',60:'PULSE',64:'PULSE',62:'ATLANTIS',65:'ATLANTIS',66:'ATLANTIS',68:'SPARKS',77:'PIONEER+DISCOVERY',87:'ELITE',88:'SNIPER'};

let qualifMap={};
let countdownInterval=null;
function startCountdown(){
  clearInterval(countdownInterval);
  const fill=document.getElementById('refresh-fill');
  let elapsed=0; fill.style.width='100%';
  countdownInterval=setInterval(()=>{
    elapsed+=1000;
    fill.style.width=Math.max(0,100-(elapsed/REFRESH_MS)*100)+'%';
  },1000);
}
let lastSeenId=localStorage.getItem('lsi')||null;

// ENTER — desbloqueia audio e inicia
let audioInstance = null;
function entrar(){
  const screen=document.getElementById('enter-screen');
  screen.style.transition='opacity .5s';
  screen.style.opacity='0';
  setTimeout(()=>screen.remove(),500);
  audioInstance = new Audio(SOM_PATH);
  audioInstance.load();
  audioInstance.play().then(()=>{
    audioInstance.pause();
    audioInstance.currentTime=0;
  }).catch(e=>console.warn('Desbloqueio audio:',e));
  iniciar();
}

function testSound(){
  const a = new Audio(SOM_PATH);
  a.volume = 1.0;
  a.play().then(()=>console.log('Som OK')).catch(e=>console.warn('Erro som:',e));
}

let _iniciado=false;
async function iniciar(){
  if(_iniciado)return; _iniciado=true;
  await fetchQualifMap();
  await tick();
  setInterval(tick,REFRESH_MS);
}
setInterval(()=>{const n=new Date(),p=x=>String(x).padStart(2,'0');document.getElementById('clock').textContent=p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds())},1000);

// PARTICLES
(()=>{const c=document.getElementById('particles'),ctx=c.getContext('2d');let W,H,S=[];const rs=()=>{W=c.width=innerWidth;H=c.height=innerHeight};rs();addEventListener('resize',rs);for(let i=0;i<100;i++)S.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.1+.2,s:Math.random()*.4+.1,d:Math.random()>.5?1:-1});(function d(){ctx.clearRect(0,0,W,H);S.forEach(s=>{s.x+=s.s*s.d*.2;if(s.x<0)s.x=W;if(s.x>W)s.x=0;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,215,0,${Math.random()*.35+.1})`;ctx.fill()});requestAnimationFrame(d)})()})();

// CONFETTI
function launchConfetti(){
  const cv=document.getElementById('confetti');cv.width=innerWidth;cv.height=innerHeight;cv.classList.add('active');
  const ctx=cv.getContext('2d'),colors=['#FFD700','#00FF41','#00FFFF','#FF3B3B','#fff','#FF69B4'];
  const P=Array.from({length:180},()=>({x:Math.random()*cv.width,y:-20,r:Math.random()*6+3,d:Math.random()*200,c:colors[Math.floor(Math.random()*6)],ta:0,ts:Math.random()*.1+.05,sp:Math.random()*3+2,sh:Math.random()>.5}));
  let f=0;(function d(){ctx.clearRect(0,0,cv.width,cv.height);P.forEach(p=>{p.y+=p.sp;p.ta+=p.ts;p.x+=Math.cos(p.d+f*.02)*1.5;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(Math.sin(p.ta)*15*Math.PI/180);ctx.fillStyle=p.c;ctx.globalAlpha=Math.max(0,1-(f/200)*1.2);p.sh?(ctx.beginPath(),ctx.arc(0,0,p.r,0,Math.PI*2),ctx.fill()):ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);ctx.restore()});f++;if(f<200)requestAnimationFrame(d);else{ctx.clearRect(0,0,cv.width,cv.height);cv.classList.remove('active')}})();
}

// SOUND
function playSound(){
  try{
    if(audioInstance){
      audioInstance.currentTime=0;
      audioInstance.volume=1.0;
      audioInstance.play().catch(e=>console.warn('Audio play:',e));
    }
  }catch(e){console.warn('Audio:',e)}
}

function celebrar(){playSound();launchConfetti();const f=document.getElementById('flash');f.style.transition='opacity .05s';f.style.opacity='.5';setTimeout(()=>{f.style.transition='opacity .4s';f.style.opacity='0'},80)}

// UTILS
const norm=s=>s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim().replace(/\s+/g,'');
const initials=s=>{if(!s||s==='—')return'?';const w=s.trim().split(/\s+/);return w.length>=2?(w[0][0]+w[w.length-1][0]).toUpperCase():s.slice(0,2).toUpperCase()};
const fmt=v=>'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate=s=>{if(!s)return'—';try{const d=new Date(s.endsWith('Z')?s:s+'Z');return d.toLocaleString('pt-BR',{timeZone:'America/Sao_Paulo',day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}catch{return s}};
const mapOpt=(r,m)=>{if(r==null||r==='')return'—';const k=String(typeof r==='number'?Math.round(r):r).trim();return m[k]||`(${k})`};

// FOTO
async function loadPhoto(nome,imgEl,initEl){
  if(!nome||nome==='—'){imgEl.style.display='none';initEl.textContent=initials(nome);initEl.style.display='flex';return}
  const candidates=[
    nome.trim(),                                      // "Camila Souza"       — exato como no Pipedrive
    norm(nome),                                       // "camilasouza"        — sem acento sem espaço
    nome.trim().toLowerCase(),                        // "camila souza"       — minúsculo com espaço
    nome.trim().replace(/\s+/g,''),                   // "CamilaSouza"        — sem espaço
    norm(nome).replace(/\s+/g,''),                    // "camilasouza"        — fallback extra
  ];
  for(const name of candidates){
    for(const ext of['jpg','jpeg','png','webp']){
      const url=`${FOTOS_PATH}${encodeURIComponent(name)}.${ext}`;
      const ok=await new Promise(r=>{const i=new Image();i.onload=()=>r(true);i.onerror=()=>r(false);i.src=url});
      if(ok){imgEl.src=url;imgEl.style.display='block';initEl.style.display='none';return}
    }
  }
  imgEl.style.display='none';initEl.textContent=initials(nome);initEl.style.display='flex';
}

// VALOR ANIMADO
function animateValor(target){
  const el=document.getElementById('valor'),dur=1200,start=performance.now();
  (function step(now){const p=Math.min((now-start)/dur,1),e=1-Math.pow(1-p,3);el.textContent=fmt(target*e);if(p<1)requestAnimationFrame(step);else el.textContent=fmt(target)})(performance.now());
}

// FETCH
async function fetchQualifMap(){try{const r=await fetch(`/api/qualif`);const d=await r.json();(d?.data?.options||[]).forEach(o=>qualifMap[String(o.id)]=o.label)}catch(e){}}

async function fetchDeals(limit=10){
  const r=await fetch(`/api/deals?limit=${limit}`);
  if(!r.ok)throw new Error(`HTTP ${r.status}`);
  return(await r.json())?.data||[];
}

// TICKER
function buildRecentes(deals){
  const top3=deals.slice(1,4);
  document.getElementById('recentes-label').textContent=`ÚLTIMAS ${top3.length} VENDAS`;
  const html=top3.map(v=>{
    const nome=v?.user_id?.name||'—';
    const valor=v?.value||0;
    const funil=PIPELINE_MAP[v?.pipeline_id||0]||'—';
    const produto=v?.[F_PRODUTO]||'—';
    return`<div class="r-card">
      <div><span class="r-dot"></span><span class="r-closer">${nome}</span></div>
      <div class="r-valor">${fmt(valor)}</div>
      <div class="r-meta"><span class="r-funil">${funil}</span><span class="r-produto">${produto}</span></div>
    </div>`;
  }).join('');
  document.getElementById('recentes-cards').innerHTML=html;
}

// MAIN PANEL
async function updatePanel(deal,isNew){
  const nome=deal?.user_id?.name||'—';
  const valor=deal?.value||0;
  const funil=PIPELINE_MAP[deal?.pipeline_id||0]||'—';
  const produto=deal?.[F_PRODUTO]||'—';
  const sdrNome=mapOpt(deal?.[F_QUALIF],qualifMap);

  document.getElementById('pill').textContent=funil;
  document.getElementById('closer-name').textContent=nome;
  document.getElementById('produto').textContent=produto;
  document.getElementById('sdr-name').textContent=sdrNome;
  document.getElementById('data-ganho').textContent=fmtDate(deal?.won_time);

  const info=document.getElementById('info');
  info.style.animation='none';void info.offsetHeight;info.style.animation='slideIn .5s ease-out';

  animateValor(valor);
  await loadPhoto(nome,document.getElementById('closer-img'),document.getElementById('closer-init'));

  const sw=document.getElementById('sdr-wrap');
  if(sdrNome&&sdrNome!=='—'){sw.style.display='block';await loadPhoto(sdrNome,document.getElementById('sdr-img'),document.getElementById('sdr-init'))}
  else sw.style.display='none';

  if(isNew)celebrar();
}

// TICK
async function tick(){
  try{
    const deals=await fetchDeals(10);
    if(!deals.length)return;
    const top=deals[0];
    const id=String(top.id);
    const isNew=lastSeenId!==null&&id!==lastSeenId;
    if(id!==lastSeenId){lastSeenId=id;localStorage.setItem('lsi',id)}
    await updatePanel(top,isNew);
    buildRecentes(deals);
  }catch(e){console.error(e)}
  startCountdown();
}

// o boot acontece via entrar() ao clicar na tela inicial
</script>
</body>
</html>
